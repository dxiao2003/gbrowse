name: CI

on:
  push:
    branches: [master]
  pull_request:

# Least privilege: the workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on PRs, but let master builds finish so the
# default branch keeps a complete build history.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      # Headed-mode tests (handoff, xvfb) need a virtual X display and xdpyinfo.
      - name: Install Xvfb and X utilities
        run: sudo apt-get update && sudo apt-get install -y xvfb x11-utils

      # Use the project's test runner (scripts/test.sh), which runs each test
      # file in its own bun process. The browser tests each launch a real
      # Chromium; sharing a single bun process lets them starve each other and
      # lets one file's stray teardown (e.g. a Chromium that's killed/OOMs
      # mid-run) take the whole runner down — which showed up as flaky,
      # unrelated test failures. Per-file isolation contains that. The script
      # re-execs itself under a single xvfb-run, so no wrapper is needed here.
      - name: Run tests
        run: bun run test
